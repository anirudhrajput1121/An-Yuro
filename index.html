<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>An Yuro | Premium Streaming</title>
    <style>
        :root {
            --bg-body: #050507;
            --bg-card: #121217;
            --accent-glow: #00d2ff;
            --gradient-yuro: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%);
            --text-white: #ffffff;
            --text-gray: #a0a0a5;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-white);
            overflow-x: hidden;
        }

        /* Navigation */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.2rem 6%;
            background: rgba(5, 5, 7, 0.9);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid #1f1f27;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 900;
            letter-spacing: 1px;
            background: var(--gradient-yuro);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 15px rgba(0, 210, 255, 0.3);
        }

        /* Category Slider */
        .category-container {
            padding: 20px 6%;
            display: flex;
            gap: 15px;
            overflow-x: auto;
            scrollbar-width: none;
        }
        .category-container::-webkit-scrollbar { display: none; }

        .cat-pill {
            background: #1c1c24;
            padding: 10px 25px;
            border-radius: 30px;
            font-size: 0.85rem;
            cursor: pointer;
            border: 1px solid #333;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .cat-pill:hover, .cat-pill.active {
            background: var(--gradient-yuro);
            border-color: transparent;
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.4);
        }

        /* Movie Grid */
        .main-content {
            padding: 0 6% 50px;
        }

        .movie-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--bg-card);
            border-radius: 15px;
            overflow: hidden;
            position: relative;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid #222;
        }

        .card:hover {
            transform: scale(1.05);
            border-color: var(--accent-glow);
        }

        .poster {
            width: 100%;
            aspect-ratio: 2/3;
            background: #222;
            position: relative;
        }

        .poster img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: var(--accent-glow);
            padding: 3px 8px;
            border-radius: 5px;
            font-size: 0.7rem;
            font-weight: bold;
            border: 1px solid var(--accent-glow);
        }

        .details {
            padding: 12px;
        }

        .details h4 {
            font-size: 0.95rem;
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .details p {
            font-size: 0.75rem;
            color: var(--text-gray);
        }

        /* Floating Contact */
        .btn-float {
            position: fixed;
            bottom: 25px;
            right: 25px;
            width: 60px;
            height: 60px;
            background: var(--gradient-yuro);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4);
            cursor: pointer;
            font-size: 1.5rem;
            border: none;
            color: white;
            z-index: 1000;
        }

        /* Mobile Adjustments */
        @media (max-width: 480px) {
            .movie-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
            .logo { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

        <div class="logo">AN YURO</div>

        <div class="cat-pill active">Trending</div>
